<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Remove Table Row</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        table{
            width:50%;
            margin:50px auto;
            border-collapse:collapse;
        }

        td,th{
            border:1px solid black;
            padding:10px;
            text-align:center;
        }

        button{
            margin:20px;
            padding:10px;
        }

    </style>
</head>

<body>

    <table id="myTable">

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Action</th>
        </tr>

        <tr>
            <td>1</td>
            <td>Rudransh</td>
            <td>
                <button class="delete">
                    Delete
                </button>
            </td>
        </tr>

        <tr>
            <td>2</td>
            <td>Aman</td>
            <td>
                <button class="delete">
                    Delete
                </button>
            </td>
        </tr>

    </table>

    <script>

        $(".delete").click(function(){

            $(this).closest("tr").remove();

        });

    </script>

</body>
</html>
