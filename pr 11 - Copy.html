<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Zebra Strip Table</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        table{
            width:50%;
            margin:50px auto;
            border-collapse:collapse;
        }

        td,th{
            border:1px solid black;
            padding:10px;
            text-align:center;
        }
    </style>
</head>

<body>

    <table>

        <tr>
            <th>ID</th>
            <th>Name</th>
        </tr>

        <tr>
            <td>1</td>
            <td>Rudransh</td>
        </tr>

        <tr>
            <td>2</td>
            <td>Aman</td>
        </tr>

        <tr>
            <td>3</td>
            <td>Rahul</td>
        </tr>

    </table>

    <script>

        $("tr:odd").css("background","lightgray");

    </script>

</body>
</html>
