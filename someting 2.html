<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fashion Ecommerce</title>

<style>
/* --- STYLES --- */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#f5f5f5;
}

.login-page{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  background:rgba(0,0,0,0.7);
  display:none; 
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.login-box{
  width:350px;
  background:white;
  padding:30px;
  border-radius:15px;
  text-align:center;
  position: relative;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

.close-btn {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 24px;
  cursor: pointer;
  color: #888;
}

.login-box input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:8px;
}

.login-btn{
  width:100%;
  padding:12px;
  border:none;
  background:#111;
  color:white;
  border-radius:8px;
  cursor:pointer;
  font-weight: bold;
  margin-top: 10px;
}

.top-bar{ background:#111; color:white; display:flex; justify-content:flex-end; padding:10px 40px; gap:20px; }
.top-bar a{ color:white; text-decoration:none; cursor:pointer; }

.navbar{ display:flex; justify-content:space-between; align-items:center; padding:15px 40px; background:white; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
.logo-container{ display:flex; align-items:center; gap:10px; }
.logo-img{ width:32px; height:32px; }

.menu button{ margin:0 5px; padding:10px; border:none; background:#111; color:white; cursor:pointer; border-radius:6px; }

/* Search Styling */
.search-box { display: flex; gap: 5px; }
.search-box input{ padding:8px 15px; width:200px; border-radius:20px 0 0 20px; border:1px solid #ccc; outline: none; }
.search-btn { padding: 8px 15px; border: none; background: #111; color: white; border-radius: 0 20px 20px 0; cursor: pointer; }

.cart{ background:#111; color:white; padding:8px 15px; border-radius:20px; cursor:pointer; }
.slider{ width:90%; height:400px; margin:30px auto; position:relative; overflow:hidden; border-radius:15px; }
.slide{ width:100%; height:100%; object-fit:cover; position:absolute; opacity:0; transition:1s; }
.slide.active{ opacity:1; }

.products{ display:flex; flex-wrap:wrap; justify-content:center; gap:20px; padding:30px; }
.product-card{ width:240px; background:white; border-radius:10px; overflow:hidden; box-shadow:0 4px 10px rgba(0,0,0,0.1); transition: 0.3s; }
.product-card:hover { transform: translateY(-5px); }
.product-card img{ width:100%; height:200px; object-fit:cover; }
.product-info{ padding:15px; text-align:center; }
.price{ margin:10px 0; font-weight:bold; }
.buy-btn{ padding:10px; background:#111; color:white; border:none; border-radius:20px; cursor:pointer; }

.cart-box{ position:fixed; right:20px; top:80px; width:300px; background:white; padding:15px; box-shadow:0 4px 10px rgba(0,0,0,0.2); display:none; border-radius:10px; z-index:999; }
.qty-btn{ width:30px; height:30px; border:none; background:#111; color:white; border-radius:50%; cursor:pointer; }

.table-container{ width:75%; margin:20px auto; background:white; padding:15px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
.product-table{ width:100%; border-collapse:collapse; font-size:14px; }
.product-table th, .product-table td{ border:1px solid #ddd; padding:8px; text-align:center; }
.product-table th{ background:#111; color:white; }
.product-table img{ width:60px; height:60px; object-fit:cover; border-radius:8px; }
</style>
</head>

<body>

<!-- MODALS -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <span class="close-btn" onclick="closeModals()">&times;</span>
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button class="login-btn" onclick="login()">Login</button>
  </div>
</div>

<div class="login-page" id="registerPage">
  <div class="login-box">
    <span class="close-btn" onclick="closeModals()">&times;</span>
    <h2>Create Account</h2>
    <input type="text" id="regUsername" placeholder="Full Name">
    <input type="email" id="regEmail" placeholder="Email Address">
    <input type="password" id="regPassword" placeholder="Password">
    <button class="login-btn" onclick="registerUser()">Register</button>
  </div>
</div>

<!-- TOP BAR -->
<div class="top-bar">
  <a onclick="openLogin()">Login</a>
  <a onclick="openRegister()">Account</a>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo-container">
    <img class="logo-img" src="https://cdn-icons-png.flaticon.com/512/1170/1170576.png">
    <b>FASHION</b>
  </div>
  <div class="menu">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('men')">Men</button>
    <button onclick="showPage('women')">Women</button>
    <button onclick="showPage('kids')">Kids</button>
    <button onclick="showPage('Home decore')">Home decore</button>
  </div>
  
  <!-- SEARCH UI -->
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search clothes..." onkeyup="if(event.key === 'Enter') searchProduct()">
    <button class="search-btn" onclick="searchProduct()">Search</button>
  </div>

  <div class="cart" onclick="toggleCart()">
    🛒 Cart (<span id="cartCount">0</span>)
  </div>
</div>

<div class="cart-box" id="cartBox">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
  <h3 style="margin-top:15px;">Total: ₹<span id="totalPrice">0</span></h3>
</div>

<!-- SLIDER (Hides during search) -->
<div class="slider" id="mainSlider">
  <img class="slide active" src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1200">
  <img class="slide" src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?q=80&w=1200">
  <img class="slide" src="https://images.unsplash.com/photo-1483985988355-763728e1935b?q=80&w=1200">
</div>

<div id="content"></div>

<div class="table-container">
  <h2 style="text-align:center; padding:20px;">Products Inventory</h2>
  <table class="product-table">
    <thead>
      <tr>
        <th>Image</th>
        <th>Product Name</th>
        <th>Category</th>
        <th>Price</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="productTableBody"></tbody>
  </table>
</div>

<script>
let cart = [];
const productsData = [
  { name:"Men T-Shirt", category:"men", price:500, img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=500" },
  { name:"Men Shoes", category:"men", price:3000, img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=500" },
  { name:"Men Watch", category:"men", price:5000, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTAHQeg-uAyU6ZtwYOSDLOtVQFDMQrZTwJDZw&s=500" },
  { name:"Men Goggles", category:"men", price:2700, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTVIcDssn8Gk0-kWXJFXDHcH8JZmfAqllEwxQ&s=500" },
  { name:"Women Dress", category:"women", price:1200, img:"https://images.unsplash.com/photo-1496747611176-843222e1e57c?q=80&w=500" },
  { name:"Women's makeup kit", category:"women", price:7000, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRNbZK_9NuI31u_yJkYi7vvCMQYwWgxHHvVNw&s=500" },
  { name:"Women Bag", category:"women", price:2000, img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3?q=80&w=500" },
  { name:"Women Shoe", category:"women", price:4000, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRaiiIWegfciA-dkTwymUFcstxnzddfNtbBnQ&s=500" },
  { name:"Kids Wear", category:"kids", price:500, img:"https://images.unsplash.com/photo-1519238359922-989348752efb?q=80&w=500" },
  { name:"Kids shoe", category:"kids", price:2000, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTR6poe6kh9fdVXa8xsjlC-xfqFLU5TFrOnpA&s=500" },
  { name:"Sofa", category:"Home decore", price:20000, img:"https://torqueindia.co/cdn/shop/files/claypool-7-seater-l-shape-sofa-for-living-room-grey-881303.jpg?v=1768658775=500" },
  { name:"Bed", category:"Home decore", price:150000, img:"https://images.woodenstreet.de/image/cache/data/bed-with-storage/brixton-sheesham-wood-bed-with-storage-drawers-king-size-honey-finish/new-logo/New%20Looks%20/3-750x650.jpg=500" },
  

];

// MODAL LOGIC
function openLogin(){ closeModals(); document.getElementById("loginPage").style.display = "flex"; }
function openRegister(){ closeModals(); document.getElementById("registerPage").style.display = "flex"; }
function closeModals(){ document.getElementById("loginPage").style.display = "none"; document.getElementById("registerPage").style.display = "none"; }

function registerUser(){
  let user = document.getElementById("regUsername").value;
  if(user !== ""){ alert("Welcome, " + user + "!"); closeModals(); } 
  else { alert("Please fill details"); }
}

function login(){
  let user = document.getElementById("username").value;
  if(user !== ""){ alert("Logged in as " + user); closeModals(); }
  else { alert("Enter credentials"); }
}

// SEARCH LOGIC
function searchProduct(){
  let value = document.getElementById("searchInput").value.toLowerCase();
  let slider = document.getElementById("mainSlider");

  // Filter products
  let filtered = productsData.filter(p => p.name.toLowerCase().includes(value));

  // Hide slider if searching, show if empty
  slider.style.display = (value === "") ? "block" : "none";

  let html = `<h2 style="text-align:center; padding:20px;">${value === "" ? "LATEST PRODUCTS" : "SEARCH RESULTS"}</h2><div class="products">`;
  
  if(filtered.length > 0) {
    filtered.forEach(p => {
      html += `<div class="product-card"><img src="${p.img}"><div class="product-info"><h3>${p.name}</h3><div class="price">₹${p.price}</div><button class="buy-btn" onclick="addToCart('${p.name}',${p.price})">Add To Cart</button></div></div>`;
    });
  } else {
    html += `<p style="width:100%; text-align:center; padding:50px;">No products found matching "${value}"</p>`;
  }
  
  html += "</div>";
  document.getElementById("content").innerHTML = html;
}

// PAGE RENDERING
function showPage(page){
  document.getElementById("mainSlider").style.display = "block";
  document.getElementById("searchInput").value = ""; // Clear search
  let filtered = (page === "home") ? productsData : productsData.filter(p => p.category === page);
  let html = `<h2 style="text-align:center; padding:20px;">${page.toUpperCase()} COLLECTION</h2><div class="products">`;
  filtered.forEach(p=>{
    html += `<div class="product-card"><img src="${p.img}"><div class="product-info"><h3>${p.name}</h3><div class="price">₹${p.price}</div><button class="buy-btn" onclick="addToCart('${p.name}',${p.price})">Add To Cart</button></div></div>`;
  });
  html += "</div>";
  document.getElementById("content").innerHTML = html;
}

function loadProductTable(){
  let html = "";
  productsData.forEach(p=>{
    html += `<tr><td><img src="${p.img}"></td><td>${p.name}</td><td>${p.category}</td><td>₹${p.price}</td><td><button class="buy-btn" onclick="addToCart('${p.name}',${p.price})" style="padding:5px 10px;">Add</button></td></tr>`;
  });
  document.getElementById("productTableBody").innerHTML = html;
}

// CART LOGIC
function addToCart(name,price){
  let found = cart.find(item => item.name === name);
  if(found){ found.qty++; } else { cart.push({ name:name, price:price, qty:1 }); }
  updateCart();
}

function updateCart(){
  let box = document.getElementById("cartItems");
  let total = 0;
  box.innerHTML = "";
  cart.forEach((item,index)=>{
    total += item.price * item.qty;
    box.innerHTML += `<div style="border-bottom:1px solid #ddd; padding:10px 0;"><h4>${item.name}</h4><p>₹${item.price} x ${item.qty}</p></div>`;
  });
  document.getElementById("cartCount").innerText = cart.reduce((a,b)=>a+b.qty,0);
  document.getElementById("totalPrice").innerText = total;
}

function toggleCart(){ let box = document.getElementById("cartBox"); box.style.display = box.style.display === "block" ? "none" : "block"; }

// SLIDER LOGIC
let slides = document.querySelectorAll(".slide");
let slideIndex = 0;
setInterval(()=>{
  slides[slideIndex].classList.remove("active");
  slideIndex = (slideIndex + 1) % slides.length;
  slides[slideIndex].classList.add("active");
},3000);

// INIT
showPage("home");
loadProductTable();
</script>

</body>
</html>
